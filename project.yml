name: LocalPlayer

options:
  bundleIdPrefix: com.localplayer
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_BITCODE: "NO"
    SWIFT_STRICT_CONCURRENCY: "minimal"

targets:
  LocalPlayer:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: .
        excludes:
          - "project.yml"
          - "SETUP.md"
          - "*.plist"
          - "*.entitlements"
          - ".github/**"
          - "build/**"
          - "*.xcodeproj/**"
          - "*.xcworkspace/**"
          - ".git/**"
    info:
      path: Info.plist
    entitlements:
      path: LocalPlayer.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.localplayer.app
        PRODUCT_NAME: LocalPlayer
        INFOPLIST_FILE: Info.plist
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
        CODE_SIGN_IDENTITY: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
